mode: daemonset

image:
  repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
  tag: "0.149.0"

presets:
  logsCollection:
    enabled: true
  kubeletMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true

extraEnvs:
  - name: MONOSCOPE_API_KEY
    valueFrom:
      secretKeyRef:
        name: monoscope-secrets
        key: api-key

config:
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch: {}
    memory_limiter:
      check_interval: 1s
      limit_mib: 4000
      spike_limit_mib: 800
    k8s_attributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.container.name
    resource:
      attributes:
        - key: x-api-key
          value: ${env:MONOSCOPE_API_KEY}
          action: upsert

  exporters:
    otlp_grpc:
      endpoint: "otelcol.monoscope.tech:4317"
      tls:
        insecure: true

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [k8s_attributes, memory_limiter, batch, resource]
        exporters: [otlp_grpc]
      metrics:
        receivers: [otlp, kubeletstats]
        processors: [k8s_attributes, memory_limiter, batch, resource]
        exporters: [otlp_grpc]
      logs:
        receivers: [otlp, filelog]
        processors: [k8s_attributes, memory_limiter, batch, resource]
        exporters: [otlp_grpc]
